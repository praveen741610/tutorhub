name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tutorhub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tutorhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/tutorhub
      DB_FALLBACK_URL: sqlite:///./tutorhub_ci.db
      AUTO_CREATE_TABLES: false
      JWT_SECRET: test_secret
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 5
      REFRESH_TOKEN_EXPIRE_MINUTES: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Compile source
        run: python -m compileall app tests alembic

      - name: Run tests
        run: python -m pytest -q

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutorhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tutorhub"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: prod
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/tutorhub
      DB_FALLBACK_URL: ""
      AUTO_CREATE_TABLES: "false"
      JWT_SECRET: change_this_secret
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_MINUTES: "20160"
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
